[phases.setup]
nixPkgs = ["nodejs_20", "python3", "gcc", "gnumake"]

[phases.install]
cmds = [
  "npm install --legacy-peer-deps",
  "npm install @rollup/rollup-linux-x64-gnu --legacy-peer-deps --no-save"
]

[phases.build]
cmds = ["npx vite build"]

[start]
cmd = "NODE_ENV=production npx tsx server.ts"
